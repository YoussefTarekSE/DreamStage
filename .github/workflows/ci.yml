name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: test
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      SUPABASE_JWT_SECRET: placeholder
      R2_ACCOUNT_ID: placeholder
      R2_ACCESS_KEY_ID: placeholder
      R2_SECRET_ACCESS_KEY: placeholder
      R2_BUCKET_NAME: dreamstage-audio
      GROQ_API_KEY: placeholder
      HF_API_KEY: placeholder
      DAILY_PROJECT_LIMIT: "0"
      DAILY_BEAT_GENERATION_LIMIT: "0"
      DAILY_MIX_LIMIT: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - name: Install system audio libraries
        run: sudo apt-get update && sudo apt-get install -y portaudio19-dev
      - name: Install backend dependencies
        run: |
          set +e
          { python -m pip install --upgrade pip && pip install -r backend/requirements.txt -r backend/requirements-dev.txt; } 2>&1 | tee /tmp/pip_install.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            ERR=$(tail -c 1500 /tmp/pip_install.log | tr '\n' ' ')
            echo "::error::pip install failed (exit $status): ${ERR}"
            exit 1
          fi
      - name: Validate backend imports and configuration
        run: |
          cd backend
          python -m py_compile app/main.py app/config.py app/auth.py
          python - <<'PY'
          from app.config import settings
          assert settings.environment == "test"
          PY
      - name: Run backend tests
        run: |
          cd backend
          set +e
          python -m pytest 2>&1 | tee /tmp/pytest.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            ERR=$(tail -c 1800 /tmp/pytest.log | tr '\n' ' ')
            echo "::error::pytest failed (exit $status): ${ERR}"
            exit 1
          fi

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Lint frontend
        run: npm run lint
        working-directory: frontend
      - name: Typecheck frontend
        run: npx tsc --noEmit
        working-directory: frontend
