name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: test
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      SUPABASE_JWT_SECRET: placeholder
      R2_ACCOUNT_ID: placeholder
      R2_ACCESS_KEY_ID: placeholder
      R2_SECRET_ACCESS_KEY: placeholder
      R2_BUCKET_NAME: dreamstage-audio
      GROQ_API_KEY: placeholder
      HF_API_KEY: placeholder
      DAILY_PROJECT_LIMIT: "0"
      DAILY_BEAT_GENERATION_LIMIT: "0"
      DAILY_MIX_LIMIT: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt 2>&1 | tee /tmp/pip_install.log || {
            {
              echo '## pip install failure (last 200 lines)'
              echo '```'
              tail -n 200 /tmp/pip_install.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }
      - name: Validate backend imports and configuration
        run: |
          cd backend
          python -m py_compile app/main.py app/config.py app/auth.py
          python - <<'PY'
          from app.config import settings
          assert settings.environment == "test"
          PY
      - name: Run backend tests
        run: |
          cd backend
          python -m pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Lint frontend
        run: npm run lint
        working-directory: frontend
      - name: Typecheck frontend
        run: npx tsc --noEmit
        working-directory: frontend
