services:
  - type: web
    name: dreamstage-api
    runtime: python
    rootDir: backend
    buildCommand: apt-get update && apt-get install -y portaudio19-dev && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: dreamstage-audio
      - key: GROQ_API_KEY
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: DAILY_PROJECT_LIMIT
        value: "10"
      - key: DAILY_BEAT_GENERATION_LIMIT
        value: "25"
      - key: DAILY_MIX_LIMIT
        value: "10"
